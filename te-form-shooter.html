<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>て形射擊遊戲 ｜ Japanese Te-Form Shooter</title>
<style>
  body { margin:0; padding:0; background:#000; color:#0f0; font-family:sans-serif; text-align:center; overflow:hidden; }
  canvas { display:block; margin:10px auto; border:4px solid #0f0; background:#111; }
  #ui { position:absolute; top:10px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); padding:8px 20px; border-radius:10px; font-size:18px; z-index:10; }
  button { margin:10px; padding:12px 24px; font-size:18px; background:#0f0; color:#000; border:none; border-radius:8px; cursor:pointer; }
</style>
</head>
<body>

<div id="ui">
  時間: <span id="timer">0</span>s　|　
  分數: <span id="score">0</span>　|　
  血量: <span id="lives">❤️❤️❤️</span>
</div>

<canvas id="game" width="800" height="620"></canvas>

<button onclick="startGame()">開始遊戲 / Start</button>
<button onclick="location.reload()">重新開始</button>

<script>
const verbs = [
  { dict: "書きます", te: "書いて", wrong1: "書きて", wrong2: "書きました" },
  { dict: "食べます", te: "食べて", wrong1: "食べますて", wrong2: "食べた" },
  { dict: "飲みます", te: "飲んで", wrong1: "飲みて", wrong2: "飲みました" },
  { dict: "見ます",   te: "見て",   wrong1: "見ますて", wrong2: "見ました" },
  { dict: "します",   te: "して",   wrong1: "しって", wrong2: "しますて" },
  { dict: "来ます",   te: "来て",   wrong1: "来ますて", wrong2: "来た" },
  { dict: "行きます", te: "行って", wrong1: "行きって", wrong2: "行きました" },
  { dict: "浴びます", te: "浴びて", wrong1: "浴びますて", wrong2: "浴びた" },
  { dict: "起きます", te: "起きて", wrong1: "起きますて", wrong2: "起きた" },
  { dict: "寝ます",   te: "寝て",   wrong1: "寝ますて", wrong2: "寝た" },
  { dict: "帰ります", te: "帰って", wrong1: "帰りて", wrong2: "帰りました" },
  { dict: "遊びます", te: "遊んで", wrong1: "遊びますて", wrong2: "遊んだ" },
  { dict: "読みます", te: "読んで", wrong1: "読みて", wrong2: "読みました" },
  { dict: "聞きます", te: "聞いて", wrong1: "聞きって", wrong2: "聞きました" },
  { dict: "買います", te: "買って", wrong1: "買いって", wrong2: "買いました" },
  { dict: "会います", te: "会って", wrong1: "会いて", wrong2: "会いました" },
  { dict: "話します", te: "話して", wrong1: "話しますて", wrong2: "話した" },
  { dict: "教えます", te: "教えて", wrong1: "教えますて", wrong2: "教えた" },
  { dict: "開けます", te: "開けて", wrong1: "開けますて", wrong2: "開けた" }
];

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width;
const H = canvas.height;

let score = 0, time = 0, lives = 3, gameRunning = false;
let timerInterval;
let boxes = [], bullets = [], particles = [], errorMarks = [], screenFlash = 0;

let playerX = W / 2;
const playerY = H - 40;
const playerWidth = 60;
let mouseX = W / 2;
let audioCtx;
let currentVerb = null;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
});
canvas.addEventListener("click", shoot);
document.addEventListener("keydown", e => { if (e.key === " " && gameRunning) shoot(); });

function random(min, max) { return Math.random() * (max - min) + min; }

function spawnBoxes() {
  boxes = [];
  const positions = [160, 400, 640];
  let options = [currentVerb.te, currentVerb.wrong1, currentVerb.wrong2];
  options.sort(() => Math.random() - 0.5);

  for (let i = 0; i < 3; i++) {
    boxes.push({
      x: positions[i],
      y: random(-180, -40),
      width: 130,
      height: 85,
      text: options[i],
      isCorrect: options[i] === currentVerb.te,
      speed: random(1.8, 3.3)
    });
  }
}

function newVerb() {
  currentVerb = verbs[Math.floor(Math.random() * verbs.length)];
  spawnBoxes();
}

function shoot() {
  if (!gameRunning) return;
  bullets.push({ x: playerX + playerWidth/2 - 5, y: playerY - 10, width: 10, height: 25, speed: 13 });
  try {
    initAudio();
    const osc = audioCtx.createOscillator();
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    const gain = audioCtx.createGain(); gain.gain.value = 0.15;
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.06);
  } catch(e) {}
}

function createParticles(x, y, color, count=28) {
  if (particles.length > 100) particles.length = 60;
  for (let i = 0; i < count; i++) {
    particles.push({ x, y, vx: random(-6.5,6.5), vy: random(-8,3), life: 38, color });
  }
}

function showError(x, y) {
  errorMarks.push({ x, y, life: 32 });
  try {
    initAudio();
    const osc = audioCtx.createOscillator();
    osc.type = "sawtooth"; osc.frequency.setValueAtTime(160, audioCtx.currentTime);
    const gain = audioCtx.createGain(); gain.gain.value = 0.25;
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.35);
  } catch(e) {}
  screenFlash = 7;
}

function updateLivesDisplay() {
  document.getElementById("lives").innerHTML = "❤️".repeat(lives) + "♡".repeat(3 - lives);
}

function gameLoop() {
  if (!gameRunning) return;
  ctx.clearRect(0, 0, W, H);

  if (screenFlash > 0) {
    ctx.fillStyle = `rgba(255,40,40,${screenFlash*0.09})`;
    ctx.fillRect(0,0,W,H);
    screenFlash--;
  }

  ctx.strokeStyle = "#002200";
  for (let i = 40; i < W; i += 80) {
    ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke();
  }

  // 方塊
  for (let i = boxes.length - 1; i >= 0; i--) {
    const b = boxes[i];
    b.y += b.speed;

    ctx.fillStyle = "#006666";
    ctx.fillRect(b.x - b.width/2, b.y, b.width, b.height);
    ctx.strokeStyle = "#00cccc"; ctx.lineWidth = 4;
    ctx.strokeRect(b.x - b.width/2, b.y, b.width, b.height);

    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 26px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(b.text, b.x, b.y + b.height/2 + 2);

    if (b.y > H + 30) {
      if (b.isCorrect) {
        showError(b.x, b.y - 30);
        lives--;
        updateLivesDisplay();
        if (lives <= 0) { endGame(); return; }
      }
      boxes.splice(i, 1);
      newVerb();        // ← 修正重點：落地
