<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>て形射擊遊戲</title>
<style>
  body { margin:0; padding:0; background:#000; color:#0f0; font-family:sans-serif; text-align:center; overflow:hidden; }
  canvas { display:block; margin:10px auto; border:4px solid #0f0; background:#111; }
  #ui { position:absolute; top:10px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); padding:10px 25px; border-radius:12px; font-size:19px; z-index:10; }
  button { margin:12px; padding:14px 28px; font-size:19px; background:#0f0; color:#000; border:none; border-radius:10px; cursor:pointer; font-weight:bold; }
</style>
</head>
<body>

<div id="ui">
  時間: <span id="timer">0</span>s　|　
  分數: <span id="score">0</span>　|　
  血量: <span id="lives">❤️❤️❤️</span>
</div>

<canvas id="game" width="800" height="620"></canvas>

<button onclick="startGame()">開始遊戲 / Start</button>
<button onclick="location.reload()">重新開始</button>

<script>
const verbs = [
  {te:"食べて", w1:"食べますて", w2:"食べた"},
  {te:"飲んで", w1:"飲みて", w2:"飲みました"},
  {te:"見て",   w1:"見ますて", w2:"見ました"},
  {te:"浴びて", w1:"浴びますて", w2:"浴びた"},
  {te:"起きて", w1:"起きますて", w2:"起きた"},
  {te:"寝て",   w1:"寝ますて", w2:"寝た"},
  {te:"帰って", w1:"帰りて", w2:"帰りました"},
  {te:"遊んで", w1:"遊びますて", w2:"遊んだ"},
  {te:"読んで", w1:"読みて", w2:"読みました"},
  {te:"聞いて", w1:"聞きって", w2:"聞きました"},
  {te:"買って", w1:"買いって", w2:"買いました"},
  {te:"会って", w1:"会いて", w2:"会いました"},
  {te:"話して", w1:"話しますて", w2:"話した"},
  {te:"教えて", w1:"教えますて", w2:"教えた"},
  {te:"開けて", w1:"開けますて", w2:"開けた"},
  {te:"勉強して", w1:"勉強ますて", w2:"勉強した"},
  {te:"出て",   w1:"出ますて", w2:"出た"},
  {te:"入って", w1:"入りて", w2:"入りました"}
];

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = 800, H = 620;

let score = 0, time = 0, lives = 3, gameRunning = false;
let timerInterval, boxes = [], bullets = [], particles = [], errorMarks = [], screenFlash = 0;
let playerX = W/2, currentVerb = null;

function random(a,b){return Math.random()*(b-a)+a;}

function spawnBoxes() {
  boxes = [];
  const pos = [170, 400, 630];
  let opts = [currentVerb.te, currentVerb.w1, currentVerb.w2];
  opts.sort(()=>Math.random()-0.5);
  for(let i=0; i<3; i++){
    boxes.push({
      x: pos[i], y: random(-200,-60), width:135, height:88,
      text: opts[i], isCorrect: opts[i]===currentVerb.te, speed: random(1.9, 3.4)
    });
  }
}

function newVerb() {
  currentVerb = verbs[Math.floor(Math.random()*verbs.length)];
  spawnBoxes();
}

function shoot() {
  if(!gameRunning) return;
  bullets.push({x: playerX+25, y: H-50, speed:14});
}

function createParticles(x,y,color){
  for(let i=0; i<25; i++){
    particles.push({x,y, vx:random(-7,7), vy:random(-9,2), life:40, color});
  }
}

function showError(x,y){
  errorMarks.push({x,y,life:35});
  screenFlash = 8;
}

function updateLives(){ document.getElementById("lives").innerHTML = "❤️".repeat(lives) + "♡".repeat(3-lives); }

function gameLoop(){
  if(!gameRunning) return;
  ctx.clearRect(0,0,W,H);

  if(screenFlash>0){
    ctx.fillStyle = `rgba(255,60,60,${screenFlash*0.1})`;
    ctx.fillRect(0,0,W,H); screenFlash--;
  }

  // 方塊
  for(let i=boxes.length-1; i>=0; i--){
    let b = boxes[i];
    b.y += b.speed;

    ctx.fillStyle = "#006666";
    ctx.fillRect(b.x-b.width/2, b.y, b.width, b.height);
    ctx.strokeStyle="#00dddd"; ctx.lineWidth=5;
    ctx.strokeRect(b.x-b.width/2, b.y, b.width, b.height);

    ctx.fillStyle = "#fff";
    ctx.font = "bold 27px Arial";
    ctx.textAlign="center";
    ctx.fillText(b.text, b.x, b.y+48);

    if(b.y > H+40){
      if(b.isCorrect){
        showError(b.x, b.y-40);
        lives--;
        updateLives();
        if(lives<=0){ endGame(); return; }
      }
      boxes.splice(i,1);
      newVerb();   // 確保繼續出新方塊
    }
  }

  // 子彈
  for(let i=bullets.length-1; i>=0; i--){
    let b = bullets[i];
    b.y -= b.speed;
    ctx.fillStyle="#ffff00";
    ctx.fillRect(b.x-5, b.y, 10, 30);
    if(b.y < -30){ bullets.splice(i,1); continue; }

    for(let j=boxes.length-1; j>=0; j--){
      let box = boxes[j];
      if(b.x > box.x-box.width/2 && b.x < box.x+box.width/2 && b.y > box.y && b.y < box.y+box.height){
        bullets.splice(i,1);
        if(box.isCorrect){
          score += 100;
          createParticles(box.x, box.y+40, "#ffff00");
          document.getElementById("score").textContent = score;
          boxes.splice(j,1);
          newVerb();
        } else {
          showError(box.x, box.y+30);
          score = Math.max(0, score-50);
          lives--;
          updateLives();
          document.getElementById("score").textContent = score;
          boxes.splice(j,1);
          if(lives>0) newVerb();
          else endGame();
        }
        break;
      }
    }
  }

  // 粒子與交叉效果（簡化）
  for(let i=particles.length-1; i>=0; i--){
    let p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.life--;
    ctx.globalAlpha = p.life/40;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, 9, 9);
    if(p.life<=0) particles.splice(i,1);
  }
  ctx.globalAlpha = 1;

  // 玩家
  playerX = Math.max(50, Math.min(W-110, mouseX || W/2));
  ctx.fillStyle = "#00ccff";
  ctx.fillRect(playerX, H-45, 60, 30);

  requestAnimationFrame(gameLoop);
}

function startTimer(){
  if(timerInterval) clearInterval(timerInterval);
  time = 0;
  timerInterval = setInterval(()=>{ if(gameRunning){ time++; document.getElementById("timer").textContent = time; }},1000);
}

function startGame(){
  score=0; time=0; lives=3;
  boxes=[]; bullets=[]; particles=[]; errorMarks=[]; screenFlash=0;
  document.getElementById("score").textContent="0";
  updateLives();

  gameRunning = true;
  startTimer();
  newVerb();        // 確保一開始就有方塊
  gameLoop();
}

function endGame(){
  gameRunning = false;
  if(timerInterval) clearInterval(timerInterval);
  alert(`遊戲結束！\n最終分數: ${score}\n時間: ${time}秒\n\n繼續加油練習て形！`);
}

canvas.addEventListener("mousemove", e => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
});

startGame();   // 自動開始
</script>
</body>
</html>
