<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語 感・知・學｜N5-N3 日語遊戲</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0c14;
            --card: #11131f;
            --accent: #ffb882;
            --accent-glow: rgba(255, 184, 130, 0.55);
            --text: #fce9da;
            --text-dim: #c9b39a;
            --correct: #25d366;
            --wrong: #ff6b6b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }

        /* 導航欄 */
        .nav {
            position: sticky; top: 0; z-index: 999;
            background: rgba(17,19,31,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,184,130,0.15);
        }
        .nav-container {
            max-width: 1100px; margin: 0 auto; padding: 0 20px;
            height: 70px; display: flex; align-items: center; justify-content: space-between;
        }
        .logo { color: var(--accent); font-size: 1.2rem; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .nav-links { display: flex; gap: 18px; list-style: none; flex-wrap: wrap; }
        .nav-links a {
            color: var(--text-dim); text-decoration: none; font-size: 0.95rem;
            transition: 0.3s;
        }
        .nav-links a:hover { color: var(--accent); }

        .container {
            max-width: 900px; margin: 40px auto; padding: 30px 20px;
            background: var(--card); border-radius: 30px;
        }

        /* 頂部按鈕：讀音訓練 */
        .top-btn-bar {
            display: flex; gap: 12px; justify-content: center; margin-bottom: 20px;
        }
        .pronunciation-btn {
            background: linear-gradient(90deg,#ffaa7a,#ffb882);
            color: #000; border: none; border-radius: 999px;
            padding: 10px 20px; font-weight: bold; cursor: pointer;
        }

        /* 遊戲 */
        .game-header {
            display: flex; justify-content: space-between; padding: 15px 20px;
            background: rgba(255,184,130,0.07); border-radius: 18px; margin-bottom: 20px;
        }
        .timer { color: #ff6b6b; font-weight: bold; }
        .score-display { color: var(--correct); font-weight: bold; }

        .level-selector { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .level-btn { padding: 10px 14px; border: 1px solid rgba(255,184,130,0.3); border-radius: 999px; background: rgba(255,184,130,0.08); color: #fff; cursor: pointer; }
        .level-btn.active { background: var(--accent); color: #000; }

        .question {
            background: rgba(20,22,35,0.6); padding: 20px; border-radius: 18px;
            margin-bottom: 16px; border: 1px solid rgba(255,184,130,0.15);
        }
        .question-text { margin-bottom: 12px; font-size: 1.1rem; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn {
            padding: 12px 16px; border-radius: 12px; text-align: left;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,184,130,0.2);
            color: #fff; cursor: pointer;
        }
        .option-btn.correct { background: rgba(37,211,102,0.2); border-color: var(--correct); }
        .option-btn.incorrect { background: rgba(255,107,107,0.2); border-color: var(--wrong); }
        .option-btn:disabled { opacity: 0.7; }

        .finish-btn {
            margin: 30px auto; display: block; padding: 14px 30px;
            background: linear-gradient(90deg,#ffaa7a,#ffb882);
            border: none; border-radius: 999px; font-weight: bold;
            cursor: pointer;
        }

        /* 讀音訓練面板 */
        #pronunciationPanel {
            display: none;
            margin-top: 30px;
            background: rgba(255,184,130,0.07);
            border-radius: 20px;
            padding: 24px;
        }
        .pronunciation-sample {
            margin-bottom: 20px;
            padding: 16px;
            background: rgba(20,22,35,0.6);
            border-radius: 16px;
        }
        .jp-sentence {
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .cn-sentence {
            color: var(--text-dim);
            margin-bottom: 12px;
        }
        .pronunciation-btn-row {
            display: flex; gap: 10px;
            flex-wrap: wrap;
        }
        .pronunciation-btn-row button {
            background: var(--accent);
            color: #000;
            border: none; border-radius: 999px;
            padding: 8px 16px; font-weight: bold; cursor: pointer;
        }
        #pronunciationNote {
            margin-top: 16px;
            color: var(--text-dim);
        }

        /* 慶祝動畫 */
        .celebration {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 999; display: none;
        }
        .celebration.active { display: block; animation: pop 1.2s ease-out forwards; }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        .final-score {
            text-align: center; font-size: 1.4rem; font-weight: bold;
            color: var(--accent); padding: 20px; border-radius: 20px;
            background: rgba(255,184,130,0.08); display: none;
        }
    </style>
</head>

<body>

<!-- 導航欄 -->
<nav class="nav">
    <div class="nav-container">
        <a href="index.html" class="logo"><i class="fas fa-wifi"></i> 感・知・學</a>
        <ul class="nav-links">

            <li><a href="learning%20resource.html">學習資源</a></li>
            <li><a href="stats.html">排名 Stats</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <div style="text-align:center; margin-bottom:20px;">
        <h1 style="color:var(--accent);">🌸 N5 → N3 日語小遊戲 🌸</h1>
        <p style="color:var(--text-dim); margin-top:8px;">計時｜分數｜音效｜慶祝動畫</p>
    </div>

    <!-- 頂部按鈕：讀音訓練 -->
    <div class="top-btn-bar">
        <button class="pronunciation-btn" onclick="togglePronunciationPanel()">🎤 讀音訓練</button>
    </div>

    <div class="game-header">
        <div class="timer">⏱ 時間：<span id="timer">0</span> 秒</div>
        <div class="score-display">⭐ 分數：<span id="score">0</span></div>
    </div>

    <div class="level-selector" id="levelSelector"></div>
    <div id="questions-container"></div>

    <button class="finish-btn" onclick="finishGame()">完成並查看成績</button>
    <div class="final-score" id="finalScore"></div>

    <!-- 讀音訓練面板 -->
    <div id="pronunciationPanel">
        <h2 style="color:var(--accent); text-align:center; margin-bottom:20px;">🎤 讀音訓練</h2>
        <div class="pronunciation-sample">
            <p class="jp-sentence">おはようございます</p>
            <p class="cn-sentence">早上好</p>
            <div class="pronunciation-btn-row">
                <button onclick="playPronunciation('おはようございます')">🔊 播放發音</button>
                <button onclick="judgePronunciationSimilarity('おはようございます')">🎙 AI 判斷讀音</button>
            </div>
        </div>
        <div class="pronunciation-sample">
            <p class="jp-sentence">こんにちは</p>
            <p class="cn-sentence">你好</p>
            <div class="pronunciation-btn-row">
                <button onclick="playPronunciation('こんにちは')">🔊 播放發音</button>
                <button onclick="judgePronunciationSimilarity('こんにちは')">🎙 AI 判斷讀音</button>
            </div>
        </div>
        <div class="pronunciation-sample">
            <p class="jp-sentence">ありがとうございます</p>
            <p class="cn-sentence">謝謝你</p>
            <div class="pronunciation-btn-row">
                <button onclick="playPronunciation('ありがとうございます')">🔊 播放發音</button>
                <button onclick="judgePronunciationSimilarity('ありがとうございます')">🎙 AI 判斷讀音</button>
            </div>
        </div>
        <div class="pronunciation-sample">
            <p class="jp-sentence">すみません</p>
            <p class="cn-sentence">對不起 / 不好意思</p>
            <div class="pronunciation-btn-row">
                <button onclick="playPronunciation('すみません')">🔊 播放發音</button>
                <button onclick="judgePronunciationSimilarity('すみません')">🎙 AI 判斷讀音</button>
            </div>
        </div>
        <div class="pronunciation-sample">
            <p class="jp-sentence">いただきます</p>
            <p class="cn-sentence">我要開動了</p>
            <div class="pronunciation-btn-row">
                <button onclick="playPronunciation('いただきます')">🔊 播放發音</button>
                <button onclick="judgePronunciationSimilarity('いただきます')">🎙 AI 判斷讀音</button>
            </div>
        </div>
        <p id="pronunciationNote"></p>
    </div>
</div>

<div class="celebration" id="celebration">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:5rem;">🎉</div>
</div>

<script>
    // 題庫 N5 → N3
    const levels = [
        {
            name: "N5 基礎",
            questions: [
                { q: "「我」是？", options: ["あなた", "わたし", "かれ"], answer:1 },
                { q: "「櫻花」是？", options: ["つき","さくら","みず"], answer:1 },
                { q: "「3」是？", options: ["いち","に","さん"], answer:2 },
                { q: "「早安」是？", options: ["おはよう","こんにちは","すみません"], answer:0 },
                { q: "「貓」是？", options: ["いぬ","ねこ","とり"], answer:1 }
            ]
        },
        {
            name: "N5 進階",
            questions: [
                { q: "「こんにちは」是？", options: ["早上","白天","晚上"], answer:1 },
                { q: "「謝謝」回應是？", options: ["どういたしまして","ごめん","はい"], answer:0 },
                { q: "「はい」是？", options: ["不是","是","請"], answer:1 },
                { q: "「多少錢」是？", options: ["いくら","なんじ","どこ"], answer:0 },
                { q: "「ごちそうさま」是？", options: ["吃飯前","吃飯後","睡覺前"], answer:1 }
            ]
        },
        {
            name: "N4 基礎",
            questions: [
                { q: "～てください 意思是？", options: ["請做…","不要做…","正在做…"], answer:0 },
                { q: "～たい 意思是？", options: ["想做…","做過…","正在做…"], answer:0 },
                { q: "「友達」讀音？", options: ["ともだち","あした","あさって"], answer:0 },
                { q: "「勉強する」是？", options: ["玩","學習","工作"], answer:1 },
                { q: "「～てもいい」是？", options: ["可以嗎","不可以","禁止"], answer:0 }
            ]
        },
        {
            name: "N4 進階",
            questions: [
                { q: "～ながら 意思是？", options: ["一邊…一邊…","之後","之前"], answer:0 },
                { q: "「駅」讀音？", options: ["えき","とり","みせ"], answer:0 },
                { q: "「便利」讀音？", options: ["べんり","あんぜん","しずか"], answer:0 },
                { q: "雨が降る 是？", options: ["下雪","下雨","晴天"], answer:1 },
                { q: "～たり～たり 是？", options: ["有時…有時…","一定","從不"], answer:0 }
            ]
        },
        {
            name: "N3 基礎",
            questions: [
                { q: "～について 意思是？", options: ["關於","之後","之前"], answer:0 },
                { q: "～によって 意思是？", options: ["根據","一起","代替"], answer:0 },
                { q: "「経験」讀音？", options: ["けいけん","きけん","けいかく"], answer:0 },
                { q: "「欠席」讀音？", options: ["けっせき","けっこん","けつあつ"], answer:0 },
                { q: "～に対して 是？", options: ["對於","代替","關於"], answer:0 }
            ]
        },
        {
            name: "N3 進階",
            questions: [
                { q: "～一方 意思是？", options: ["一方面…另一方面…","代替","關於"], answer:0 },
                { q: "～に伴って 是？", options: ["伴隨著","根據","代替"], answer:0 },
                { q: "「影響」讀音？", options: ["えいきょう","えいご","えいが"], answer:0 },
                { q: "「意識」讀音？", options: ["いしき","いじ","いけん"], answer:0 },
                { q: "～に応じて 是？", options: ["根據","代替","關於"], answer:0 }
            ]
        }
    ];

    let currentLevel = 0;
    let score = 0;
    let questions = [];
    let timerInterval;
    let gameFinished = false;

    // 音效
    const soundCorrect = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.mp3");
    const soundWrong = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-buzz-955.mp3");
    const soundFinish = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-complete-2031.mp3");

    // 建立關卡按鈕
    function createLevels() {
        const wrap = document.getElementById("levelSelector");
        levels.forEach((lv, i) => {
            const btn = document.createElement("button");
            btn.className = "level-btn" + (i == 0 ? " active" : "");
            btn.innerText = lv.name;
            btn.onclick = () => {
                currentLevel = i;
                resetGame();
                loadQuestions();
                document.querySelectorAll(".level-btn").forEach((b, idx) => {
                    b.classList.toggle("active", idx == i);
                });
            };
            wrap.appendChild(btn);
        });
    }

    // 載入題目
    function loadQuestions() {
        const container = document.getElementById("questions-container");
        container.innerHTML = "";
        questions = levels[currentLevel].questions;
        questions.forEach((q, idx) => {
            const div = document.createElement("div");
            div.className = "question";
            div.innerHTML = `<div class="question-text">${idx+1}. ${q.q}</div>`;
            const opts = document.createElement("div");
            opts.className = "options";
            q.options.forEach((opt, i) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAns(btn, idx, i);
                opts.appendChild(btn);
            });
            div.appendChild(opts);
            container.appendChild(div);
        });
    }

    // 檢查答案
    function checkAns(btn, qIdx, oIdx) {
        if (gameFinished) return;
        const q = questions[qIdx];
        const all = btn.parentElement.querySelectorAll(".option-btn");
        all.forEach(b => b.disabled = true);

        if (oIdx === q.answer) {
            btn.classList.add("correct");
            btn.innerText += " ✅";
            score++;
            soundCorrect.play();
        } else {
            btn.classList.add("incorrect");
            btn.innerText += " ❌";
            all[q.answer].classList.add("correct");
            soundWrong.play();
        }
        document.getElementById("score").innerText = score;
    }

    // 計時器
    function startTimer() {
        let sec = 0;
        timerInterval = setInterval(() => {
            sec++;
            document.getElementById("timer").innerText = sec;
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
    }

    // 結算遊戲
    function finishGame() {
        if (gameFinished) return;
        gameFinished = true;
        stopTimer();
        soundFinish.play();
        document.getElementById("celebration").classList.add("active");
        const final = document.getElementById("finalScore");
        final.style.display = "block";
        final.innerText = `🎉 完成！\n分數：${score}/${questions.length}`;
    }

    // 重置
    function resetGame() {
        score = 0;
        gameFinished = false;
        document.getElementById("score").innerText = 0;
        document.getElementById("finalScore").style.display = "none";
        document.getElementById("celebration").classList.remove("active");
        stopTimer();
        startTimer();
    }

    // 讀音訓練面板切換
    function togglePronunciationPanel() {
        const panel = document.getElementById("pronunciationPanel");
        panel.style.display = panel.style.display === "block" ? "none" : "block";
    }

    // 播放標準讀音
    function playPronunciation(phrase) {
        const note = document.getElementById("pronunciationNote");
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(phrase);
            utterance.lang = 'ja-JP';
            speechSynthesis.speak(utterance);
            note.innerText = `正在播放：${phrase}`;
        } else {
            note.innerText = '此瀏覽器不支援語音合成';
        }
    }

    // 計算讀音相似度
    function normalizeText(text) {
        return text.toLowerCase().replace(/[^a-z0-9\u3040-\u30ff\u4e00-\u9fff]/g, '');
    }

    function getSimilarity(a, b) {
        const textA = normalizeText(a);
        const textB = normalizeText(b);
        if (!textA.length || !textB.length) return 0;
        const dp = Array.from({ length: textA.length + 1 }, () => Array(textB.length + 1).fill(0));
        for (let i = 0; i <= textA.length; i++) dp[i][0] = i;
        for (let j = 0; j <= textB.length; j++) dp[0][j] = j;
        for (let i = 1; i <= textA.length; i++) {
            for (let j = 1; j <= textB.length; j++) {
                const cost = textA[i - 1] === textB[j - 1] ? 0 : 1;
                dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + cost);
            }
        }
        const distance = dp[textA.length][textB.length];
        return Math.max(0, Math.round((1 - distance / Math.max(textA.length, textB.length)) * 100));
    }

    // AI 判斷讀音
    function judgePronunciationSimilarity(phrase) {
        const note = document.getElementById("pronunciationNote");
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            note.innerText = '此瀏覽器不支援語音辨識，請使用 Chrome 或 Edge。';
            return;
        }
        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        recognition.onstart = () => {
            note.innerText = `請朗讀：${phrase}`;
        };
        recognition.onresult = event => {
            const transcript = event.results[0][0].transcript.trim();
            const similarity = getSimilarity(transcript, phrase);
            note.innerText = `辨識結果：${transcript}，相似度：${similarity}%`;
        };
        recognition.onerror = event => {
            note.innerText = `語音辨識錯誤：${event.error}`;
        };
        recognition.onend = () => {
            if (!note.innerText.startsWith('辨識結果')) {
                note.innerText = '辨識結束，請再試一次。';
            }
        };
        recognition.start();
    }

    // 開始
    createLevels();
    loadQuestions();
    startTimer();
</script>

</body>
