<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語 感・知・學｜N5-N1 日語遊戲</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #0a0c14;
            --card: #11131f;
            --accent: #ffb882;
            --accent-glow: rgba(255, 184, 130, 0.55);
            --text: #fce9da;
            --text-dim: #c9b39a;
            --correct: #25d366;
            --wrong: #ff6b6b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }
        
        .nav { position: sticky; top: 0; z-index: 999; background: rgba(17,19,31,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,184,130,0.15); }
        .nav-container { max-width: 1100px; margin: 0 auto; padding: 0 20px; height: 70px; display: flex; align-items: center; justify-content: space-between; }
        .logo { color: var(--accent); font-size: 1.2rem; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .nav-links { display: flex; gap: 18px; list-style: none; flex-wrap: wrap; }
        .nav-links a { color: var(--text-dim); text-decoration: none; font-size: 0.95rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        .container { max-width: 900px; margin: 40px auto; padding: 30px 20px; background: var(--card); border-radius: 30px; }
        .top-btn-bar { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .top-btn { background: linear-gradient(90deg,#ffaa7a,#ffb882); color: #000; border: none; border-radius: 999px; padding: 10px 20px; font-weight: bold; cursor: pointer; }

        .game-header { display: flex; justify-content: space-between; padding: 15px 20px; background: rgba(255,184,130,0.07); border-radius: 18px; margin-bottom: 20px; }
        .timer { color: #ff6b6b; font-weight: bold; }
        .score-display { color: var(--correct); font-weight: bold; }

        .level-selector { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .level-btn { padding: 10px 14px; border: 1px solid rgba(255,184,130,0.3); border-radius: 999px; background: rgba(255,184,130,0.08); color: #fff; cursor: pointer; }
        .level-btn.active { background: var(--accent); color: #000; }

        .question { background: rgba(20,22,35,0.6); padding: 20px; border-radius: 18px; margin-bottom: 16px; border: 1px solid rgba(255,184,130,0.15); }
        .question-text { margin-bottom: 12px; font-size: 1.1rem; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn {
            padding: 12px 16px; border-radius: 12px; text-align: left;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,184,130,0.2);
            color: #fff; cursor: pointer;
        }
        .option-btn.correct { background: rgba(37,211,102,0.2); border-color: var(--correct); }
        .option-btn.incorrect { background: rgba(255,107,107,0.2); border-color: var(--wrong); }
        .option-btn:disabled { opacity: 0.7; }

        .finish-btn {
            margin: 30px auto; display: block; padding: 14px 30px;
            background: linear-gradient(90deg,#ffaa7a,#ffb882);
            border: none; border-radius: 999px; font-weight: bold; cursor: pointer;
        }

        #pronunciationPanel {
            display: none; margin-top: 30px; background: rgba(255,184,130,0.07);
            border-radius: 20px; padding: 24px;
        }
        .pronunciation-sample {
            margin-bottom: 20px; padding: 16px;
            background: rgba(20,22,35,0.6); border-radius: 16px;
        }
        .jp-sentence { font-size: 1.5rem; color: var(--accent); margin-bottom: 8px; }
        .cn-sentence { color: var(--text-dim); margin-bottom: 12px; }
        .pronunciation-btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .pronunciation-btn-row button {
            background: var(--accent); color: #000; border: none; border-radius: 999px;
            padding: 8px 16px; font-weight: bold; cursor: pointer;
        }
        .accuracy { font-weight: bold; margin-top: 8px; font-size: 1rem; }
        .final-score {
            text-align: center; font-size: 1.4rem; font-weight: bold;
            color: var(--accent); padding: 20px; border-radius: 20px;
            background: rgba(255,184,130,0.08); display: none; white-space: pre-line; line-height: 1.6;
        }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-container">
        <a href="index.html" class="logo"><i class="fas fa-wifi"></i> 感・知・學</a>
        <ul class="nav-links">
            <li><a href="index.html">首頁 Home</a></li>
            <li><a href="features.html">智能特色 Features</a></li>
            <li><a href="game.html">學習遊戲 Game</a></li>
            <li><a href="about.html">關於我們 About</a></li>
            <li><a href="poster.html">海報 Poster</a></li>
            <li><a href="learning progress.html">學習進度</a></li>
            <li><a href="learning resource.html">學習資源</a></li>
            <li><a href="stats.html">排名 Stats</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <div style="text-align:center; margin-bottom:20px;">
        <h1 style="color:var(--accent);">🌸 N5 → N1 日語小遊戲 🌸</h1>
        <p style="color:var(--text-dim); margin-top:8px;">計時｜分數｜自然語音｜慶祝動畫</p>
    </div>

    <div class="top-btn-bar">
        <button class="top-btn" onclick="togglePronunciationPanel()">🎤 讀音訓練</button>
        <button class="top-btn" onclick="openForgettingGame()">🧠 遺忘曲線記憶</button>
        <button class="top-btn" onclick="openTeFormShooter()">🎮 て形射擊遊戲</button>
    </div>

    <div class="game-header">
        <div class="timer">⏱ 時間：<span id="timer">0</span> 秒</div>
        <div class="score-display">⭐ 分數：<span id="score">0</span></div>
    </div>

    <div class="level-selector" id="levelSelector"></div>
    <div id="questions-container"></div>
    <button class="finish-btn" onclick="finishGame()">完成並查看成績</button>
    <div class="final-score" id="finalScore"></div>

    <!-- 讀音訓練面板 -->
    <div id="pronunciationPanel">
        <h2 style="color:var(--accent); text-align:center; margin-bottom:20px;">🎤 讀音訓練（自然女性聲音）</h2>
        
        <div class="pronunciation-sample">
            <p class="jp-sentence">おはようございます</p>
            <p class="cn-sentence">早上好</p>
            <div class="pronunciation-btn-row">
                <button onclick="speakJapanese('おはようございます')">🔊 播放發音</button>
                <button onclick="checkAccuracy('おはようございます','acc1')">🎙 錄音評分</button>
            </div>
            <div id="acc1" class="accuracy"></div>
        </div>

        <div class="pronunciation-sample">
            <p class="jp-sentence">こんにちは</p>
            <p class="cn-sentence">你好</p>
            <div class="pronunciation-btn-row">
                <button onclick="speakJapanese('こんにちは')">🔊 播放發音</button>
                <button onclick="checkAccuracy('こんにちは','acc2')">🎙 錄音評分</button>
            </div>
            <div id="acc2" class="accuracy"></div>
        </div>

        <div class="pronunciation-sample">
            <p class="jp-sentence">ありがとうございます</p>
            <p class="cn-sentence">謝謝你</p>
            <div class="pronunciation-btn-row">
                <button onclick="speakJapanese('ありがとうございます')">🔊 播放發音</button>
                <button onclick="checkAccuracy('ありがとうございます','acc3')">🎙 錄音評分</button>
            </div>
            <div id="acc3" class="accuracy"></div>
        </div>
    </div>
</div>

<script>
// ==================== 遊戲核心資料 ====================
const levels = [
    {name:"N5", questions: [
        {q:"「我」是？", options:["あなた","わたし","かれ"], answer:1},
        {q:"「櫻花」是？", options:["つき","さくら","みず"], answer:1},
        {q:"「3」是？", options:["いち","に","さん"], answer:2},
        {q:"「早安」是？", options:["おはよう","こんにちは","すみません"], answer:0},
        {q:"「貓」是？", options:["いぬ","ねこ","とり"], answer:1},
        {q:"「水」是？", options:["くさ","みず","ひと"], answer:1},
        {q:"「ありがとう」意思是？", options:["你好","謝謝","再見"], answer:1},
        {q:"「こんにちは」意思是？", options:["早上好","你好","晚上好"], answer:1}
    ]},
    // 你可以繼續補充 N4 ~ N1 的題目...
    {name:"N4", questions: []},
    {name:"N3", questions: []},
    {name:"N2", questions: []},
    {name:"N1", questions: []}
];

let currentLevel = 0;
let score = 0;
let questions = [];
let timerInterval;
let gameFinished = false;

// ==================== 自然女性日語語音 ====================
let japaneseVoice = null;

function loadJapaneseVoice() {
    const voices = speechSynthesis.getVoices();
    japaneseVoice = voices.find(v => 
        (v.name.includes("Google") || v.name.includes("Kyoko")) && v.lang === "ja-JP"
    ) || voices.find(v => v.lang === "ja-JP");
}

speechSynthesis.onvoiceschanged = loadJapaneseVoice;
setTimeout(loadJapaneseVoice, 300);

function speakJapanese(text) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'ja-JP';
    utterance.rate = 0.93;
    utterance.pitch = 1.06;
    if (japaneseVoice) utterance.voice = japaneseVoice;
    window.speechSynthesis.speak(utterance);
}

// ==================== 主要遊戲函數 ====================
function createLevels() {
    const wrap = document.getElementById("levelSelector");
    wrap.innerHTML = "";
    levels.forEach((lv, i) => {
        const btn = document.createElement("button");
        btn.className = `level-btn ${i === 0 ? "active" : ""}`;
        btn.textContent = lv.name;
        btn.onclick = () => {
            currentLevel = i;
            resetGame();
            loadQuestions();
            document.querySelectorAll(".level-btn").forEach((b, idx) => {
                b.classList.toggle("active", idx === i);
            });
        };
        wrap.appendChild(btn);
    });
}

function loadQuestions() {
    const container = document.getElementById("questions-container");
    container.innerHTML = "";
    questions = levels[currentLevel].questions || [];
    
    if (questions.length === 0) {
        container.innerHTML = "<p style='text-align:center; color:var(--text-dim);'>此等級題目開發中...</p>";
        return;
    }

    questions.forEach((q, idx) => {
        const div = document.createElement("div");
        div.className = "question";
        div.innerHTML = `<div class="question-text">${idx+1}. ${q.q}</div>`;
        
        const opts = document.createElement("div");
        opts.className = "options";
        
        q.options.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.textContent = opt;
            btn.onclick = () => checkAns(btn, idx, i);
            opts.appendChild(btn);
        });
        div.appendChild(opts);
        container.appendChild(div);
    });
}

function checkAns(btn, qIdx, oIdx) {
    if (gameFinished) return;
    const q = questions[qIdx];
    const allBtns = btn.parentElement.querySelectorAll(".option-btn");
    allBtns.forEach(b => b.disabled = true);

    if (oIdx === q.answer) {
        btn.classList.add("correct");
        score++;
        // soundCorrect.play();   // 如有音效可再加回
    } else {
        btn.classList.add("incorrect");
        allBtns[q.answer].classList.add("correct");
    }
    document.getElementById("score").innerText = score;
}

function startTimer() {
    let sec = 0;
    timerInterval = setInterval(() => {
        sec++;
        document.getElementById("timer").innerText = sec;
    }, 1000);
}

function stopTimer() {
    clearInterval(timerInterval);
}

function finishGame() {
    if (gameFinished) return;
    gameFinished = true;
    stopTimer();
    confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });

    const time = parseInt(document.getElementById("timer").innerText);
    let percent = time <= 25 ? 95 : time <= 40 ? 75 : time <= 60 ? 55 : 35;

    const final = document.getElementById("finalScore");
    final.style.display = "block";
    final.innerText = `完成時間：${time} 秒\n擊敗全國 ${percent}% 的學習者！`;
}

function resetGame() {
    score = 0;
    gameFinished = false;
    document.getElementById("score").innerText = 0;
    document.getElementById("finalScore").style.display = "none";
    stopTimer();
    startTimer();
}

function togglePronunciationPanel() {
    const panel = document.getElementById('pronunciationPanel');
    panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
}

// 其他功能（可保留或暫時註解）
function openForgettingGame() { alert("遺忘曲線記憶遊戲開發中..."); }
function openTeFormShooter() { alert("て形射擊遊戲開發中..."); }

// ==================== 初始化 ====================
createLevels();
loadQuestions();
startTimer();
</script>
</body>
</html>
