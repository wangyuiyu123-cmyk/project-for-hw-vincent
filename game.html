<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語 感・知・學｜N5-N3 日語遊戲</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #0a0c14;
            --card: #11131f;
            --accent: #ffb882;
            --accent-glow: rgba(255, 184, 130, 0.55);
            --text: #fce9da;
            --text-dim: #c9b39a;
            --correct: #25d366;
            --wrong: #ff6b6b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }

        .nav {
            position: sticky; top: 0; z-index: 999;
            background: rgba(17,19,31,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,184,130,0.15);
        }
        .nav-container {
            max-width: 1100px; margin: 0 auto; padding: 0 20px;
            height: 70px; display: flex; align-items: center; justify-content: space-between;
        }
        .logo { color: var(--accent); font-size: 1.2rem; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .nav-links { display: flex; gap: 18px; list-style: none; flex-wrap: wrap; }
        .nav-links a {
            color: var(--text-dim); text-decoration: none; font-size: 0.95rem;
            transition: 0.3s;
        }
        .nav-links a:hover { color: var(--accent); }

        .container {
            max-width: 900px; margin: 40px auto; padding: 30px 20px;
            background: var(--card); border-radius: 30px;
        }

        .top-btn-bar {
            display: flex; gap: 12px; justify-content: center; margin-bottom: 20px;
        }
        .pronunciation-btn {
            background: linear-gradient(90deg,#ffaa7a,#ffb882);
            color: #000; border: none; border-radius: 999px;
            padding: 10px 20px; font-weight: bold; cursor: pointer;
        }

        .game-header {
            display: flex; justify-content: space-between; padding: 15px 20px;
            background: rgba(255,184,130,0.07); border-radius: 18px; margin-bottom: 20px;
        }
        .timer { color: #ff6b6b; font-weight: bold; }
        .score-display { color: var(--correct); font-weight: bold; }

        .level-selector { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .level-btn { padding: 10px 14px; border: 1px solid rgba(255,184,130,0.3); border-radius: 999px; background: rgba(255,184,130,0.08); color: #fff; cursor: pointer; }
        .level-btn.active { background: var(--accent); color: #000; }

        .question {
            background: rgba(20,22,35,0.6); padding: 20px; border-radius: 18px;
            margin-bottom: 16px; border: 1px solid rgba(255,184,130,0.15);
        }
        .question-text { margin-bottom: 12px; font-size: 1.1rem; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn {
            padding: 12px 16px; border-radius: 12px; text-align: left;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,184,130,0.2);
            color: #fff; cursor: pointer;
        }
        .option-btn.correct { background: rgba(37,211,102,0.2); border-color: var(--correct); }
        .option-btn.incorrect { background: rgba(255,107,107,0.2); border-color: var(--wrong); }
        .option-btn:disabled { opacity: 0.7; }

        .finish-btn {
            margin: 30px auto; display: block; padding: 14px 30px;
            background: linear-gradient(90deg,#ffaa7a,#ffb882);
            border: none; border-radius: 999px; font-weight: bold;
            cursor: pointer;
        }

        #pronunciationPanel {
            display: none;
            margin-top: 30px;
            background: rgba(255,184,130,0.07);
            border-radius: 20px;
            padding: 24px;
        }
        .pronunciation-sample {
            margin-bottom: 20px;
            padding: 16px;
            background: rgba(20,22,35,0.6);
            border-radius: 16px;
        }
        .jp-sentence {
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .cn-sentence {
            color: var(--text-dim);
            margin-bottom: 12px;
        }
        .pronunciation-btn-row {
            display: flex; gap: 10px;
            flex-wrap: wrap;
        }
        .pronunciation-btn-row button {
            background: var(--accent);
            color: #000;
            border: none; border-radius: 999px;
            padding: 8px 16px; font-weight: bold; cursor: pointer;
        }
        #pronunciationNote {
            margin-top: 16px;
            color: var(--text-dim);
        }

        .final-score {
            text-align: center; font-size: 1.4rem; font-weight: bold;
            color: var(--accent); padding: 20px; border-radius: 20px;
            background: rgba(255,184,130,0.08); display: none;
            white-space: pre-line;
            line-height: 1.6;
        }
    </style>
</head>

<body>

<nav class="nav">
    <div class="nav-container">
        <a href="index.html" class="logo"><i class="fas fa-wifi"></i> 感・知・學</a>
        <ul class="nav-links">
            <li><a href="index.html">首頁 Home</a></li>
            <li><a href="features.html">智能特色 Features</a></li>
            <li><a href="game.html">學習遊戲 Game</a></li>
            <li><a href="about.html">關於我們 About</a></li>
            <li><a href="poster.html">海報 Poster</a></li>
            <li><a href="learning%20progress.html">學習進度</a></li>
            <li><a href="learning%20resource.html">學習資源</a></li>
            <li><a href="stats.html">排名 Stats</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <div style="text-align:center; margin-bottom:20px;">
        <h1 style="color:var(--accent);">🌸 N5 → N3 日語小遊戲 🌸</h1>
        <p style="color:var(--text-dim); margin-top:8px;">計時｜分數｜音效｜慶祝動畫</p>
    </div>

    <div class="top-btn-bar">
        <button class="pronunciation-btn" onclick="togglePronunciationPanel()">🎤 讀音訓練</button>
    </div>

    <div class="game-header">
        <div class="timer">⏱ 時間：<span id="timer">0</span> 秒</div>
        <div class="score-display">⭐ 分數：<span id="score">0</span></div>
    </div>

    <div class="level-selector" id="levelSelector"></div>
    <div id="questions-container"></div>

    <button class="finish-btn" onclick="finishGame()">完成並查看成績</button>
    <div class="final-score" id="finalScore"></div>

    <div id="pronunciationPanel">
        <h2 style="color:var(--accent); text-align:center; margin-bottom:20px;">🎤 讀音訓練</h2>
        <div class="pronunciation-sample">
            <p class="jp-sentence">おはようございます</p>
            <p class="cn-sentence">早上好</p>
            <div class="pronunciation-btn-row">
                <button onclick="playGoogleJapaneseVoice('おはようございます')">🔊 播放發音</button>
                <button onclick="judgePronunciationSimilarity('おはようございます')">🎙 AI 判斷讀音</button>
            </div>
        </div>
        <div class="pronunciation-sample">
            <p class="jp-sentence">こんにちは</p>
            <p class="cn-sentence">你好</p>
            <div class="pronunciation-btn-row">
                <button onclick="playGoogleJapaneseVoice('こんにちは')">🔊 播放發音</button>
                <button onclick="judgePronunciationSimilarity('こんにちは')">🎙 AI 判斷讀音</button>
            </div>
        </div>
        <div class="pronunciation-sample">
            <p class="jp-sentence">ありがとうございます</p>
            <p class="cn-sentence">謝謝你</p>
            <div class="pronunciation-btn-row">
                <button onclick="playGoogleJapaneseVoice('ありがとうございます')">🔊 播放發音</button>
                <button onclick="judgePronunciationSimilarity('ありがとうございます')">🎙 AI 判斷讀音</button>
            </div>
        </div>
    </div>
</div>

<script>
const levels = [
    {
        name: "N5 基礎",
        questions: [
            { q: "「我」是？", options: ["あなた", "わたし", "かれ"], answer: 1 },
            { q: "「櫻花」是？", options: ["つき", "さくら", "みず"], answer: 1 },
            { q: "「3」是？", options: ["いち", "に", "さん"], answer: 2 },
            { q: "「早安」是？", options: ["おはよう", "こんにちは", "すみません"], answer: 0 },
            { q: "「貓」是？", options: ["いぬ", "ねこ", "とり"], answer: 1 }
        ]
    },
    {
        name: "N5 進階",
        questions: [
            { q: "「こんにちは」是？", options: ["早上", "白天", "晚上"], answer: 1 },
            { q: "「謝謝」回應是？", options: ["どういたしまして", "ごめん", "はい"], answer: 0 },
            { q: "「はい」是？", options: ["不是", "是", "請"], answer: 1 },
            { q: "「多少錢」是？", options: ["いくら", "なんじ", "どこ"], answer: 0 },
            { q: "「ごちそうさま」是？", options: ["吃飯前", "吃飯後", "睡覺前"], answer: 1 }
        ]
    },
    { name: "N4 基礎", questions: [
        { q: "～てください 意思是？", options: ["請做…", "不要做…", "正在做…"], answer: 0 },
        { q: "～たい 意思是？", options: ["想做…", "做過…", "正在做…"], answer: 0 },
        { q: "「友達」讀音？", options: ["ともだち", "あした", "あさって"], answer: 0 },
        { q: "「勉強する」是？", options: ["玩", "學習", "工作"], answer: 1 },
    ]},
    { name: "N4 進階", questions: [
        { q: "～ながら 意思是？", options: ["一邊…一邊…", "之後", "之前"], answer: 0 },
        { q: "「駅」讀音？", options: ["えき", "とり", "みせ"], answer: 0 },
    ]},
    { name: "N3 基礎", questions: [
        { q: "～について 意思是？", options: ["關於", "之後", "之前"], answer: 0 },
    ]},
    { name: "N3 進階", questions: [
        { q: "～一方 意思是？", options: ["一方面…另一方面…", "代替", "關於"], answer: 0 },
    ]}
];

let currentLevel = 0;
let score = 0;
let questions = [];
let timerInterval;
let gameFinished = false;

const soundCorrect = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.mp3");
const soundWrong = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-buzz-955.mp3");
const soundFinish = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-complete-2031.mp3");

function createLevels() {
    const wrap = document.getElementById("levelSelector");
    levels.forEach((lv, i) => {
        const btn = document.createElement("button");
        btn.className = "level-btn" + (i == 0 ? " active" : "");
        btn.innerText = lv.name;
        btn.onclick = () => {
            currentLevel = i;
            resetGame();
            loadQuestions();
            document.querySelectorAll(".level-btn").forEach((b, idx) => {
                b.classList.toggle("active", idx == i);
            });
        };
        wrap.appendChild(btn);
    });
}

function loadQuestions() {
    const container = document.getElementById("questions-container");
    container.innerHTML = "";
    questions = levels[currentLevel].questions;
    questions.forEach((q, idx) => {
        const div = document.createElement("div");
        div.className = "question";
        div.innerHTML = `<div class="question-text">${idx+1}. ${q.q}</div>`;
        const opts = document.createElement("div");
        opts.className = "options";
        q.options.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => checkAns(btn, idx, i);
            opts.appendChild(btn);
        });
        div.appendChild(opts);
        container.appendChild(div);
    });
}

function checkAns(btn, qIdx, oIdx) {
    if (gameFinished) return;
    const q = questions[qIdx];
    const all = btn.parentElement.querySelectorAll(".option-btn");
    all.forEach(b => b.disabled = true);

    if (oIdx === q.answer) {
        btn.classList.add("correct");
        btn.innerText += " ✅";
        score++;
        soundCorrect.play();
    } else {
        btn.classList.add("incorrect");
        btn.innerText += " ❌";
        all[q.answer].classList.add("correct");
        soundWrong.play();
    }
    document.getElementById("score").innerText = score;
}

function startTimer() {
    let sec = 0;
    timerInterval = setInterval(() => {
        sec++;
        document.getElementById("timer").innerText = sec;
    }, 1000);
}

function stopTimer() {
    clearInterval(timerInterval);
}

function finishGame() {
    if (gameFinished) return;
    gameFinished = true;
    stopTimer();
    soundFinish.play();

    confetti({
        particleCount: 200,
        spread: 70,
        origin: { y: 0.6 },
        colors: ['#ffb882', '#25d366', '#ff6b6b', '#ffffff']
    });

    const time = parseInt(document.getElementById("timer").innerText);
    let percent;

    if (time <= 20) {
        percent = 99;
    } else if (time <= 35) {
        percent = 80;
    } else if (time <= 50) {
        percent = 60;
    } else {
        percent = 30;
    }

    const final = document.getElementById("finalScore");
    final.style.display = "block";
    final.innerText = `你的完成速度（${time}秒）\n擊敗全國 ${percent}% 的人！`;
}

function resetGame() {
    score = 0;
    gameFinished = false;
    document.getElementById("score").innerText = 0;
    document.getElementById("finalScore").style.display = "none";
    stopTimer();
    startTimer();
}

function togglePronunciationPanel() {
    const panel = document.getElementById("pronunciationPanel");
    panel.style.display = panel.style.display === "block" ? "none" : "block";
}

function playGoogleJapaneseVoice(text) {
    const audio = new Audio();
    audio.src = `https://translate.google.com/translate_tts?ie=UTF-8&tl=ja&client=tw-ob&q=${encodeURIComponent(text)}`;
    audio.play();
    document.getElementById("pronunciationNote").innerText = `🎧 播放標準發音：${text}`;
}

function judgePronunciationSimilarity(phrase) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("你的瀏覽器不支援語音辨識，請使用 Chrome 或 Edge");
        return;
    }
    const r = new SpeechRecognition();
    r.lang = 'ja-JP';
    r.onresult = e => {
        const res = e.results[0][0].transcript;
        alert(`辨識結果：${res}\n標準句子：${phrase}`);
    };
    r.start();
}

createLevels();
loadQuestions();
startTimer();
</script>

</body>
</html>
