<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語 感・知・學 – 遊戲加強版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0c14;
            --card: #11131f;
            --accent: #ffb882;
            --accent-glow: rgba(255, 184, 130, 0.55);
            --text: #fce9da;
            --text-dim: #c9b39a;
            --correct: #25d366;
            --wrong: #ff6b6b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; min-height: 100vh; }

        .nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(17,19,31,0.95); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,184,130,0.15);
        }
        .nav-container {
            max-width: 1100px; margin: 0 auto; padding: 0 20px;
            display: flex; align-items: center; justify-content: space-between; height: 70px;
        }
        .logo { font-size: 1.3rem; font-weight: bold; color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .nav-links { display: flex; gap: 16px; list-style: none; flex-wrap: wrap; }
        .nav-links a { color: var(--text-dim); text-decoration: none; font-size: 0.95rem; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }
        .nav-cta { background: var(--accent); color: #000; padding: 8px 16px; border-radius: 999px; font-weight: bold; text-decoration: none; }

        .container {
            max-width: 900px; margin: 30px auto; padding: 30px 20px;
            background: var(--card); border-radius: 30px;
            border: 1px solid rgba(255,184,130,0.12);
        }

        .content-section { display: none; }
        .content-section.active { display: block; }

        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.2rem; background: linear-gradient(90deg,#ffaa7a,#ffb882); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .subtitle { color: var(--text-dim); }

        /* 遊戲介面 */
        .game-box { max-width: 700px; margin: 0 auto; }
        .game-header {
            display: flex; justify-content: space-between;
            padding: 15px 20px; background: rgba(255,184,130,0.07);
            border-radius: 18px; margin-bottom: 20px;
            font-size: 1.1rem; font-weight: bold;
        }
        .timer { color: #ff6b6b; }
        .score-display { color: var(--correct); }

        .level-selector { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .level-btn { padding: 10px 14px; border: 1px solid rgba(255,184,130,0.3); border-radius: 999px; background: rgba(255,184,130,0.08); color: #fff; cursor: pointer; }
        .level-btn.active, .level-btn:hover { background: var(--accent); color: #000; }

        .question {
            background: rgba(20,22,35,0.6); padding: 20px; border-radius: 18px;
            margin-bottom: 16px; border: 1px solid rgba(255,184,130,0.15);
        }
        .question-text { font-size: 1.1rem; margin-bottom: 12px; font-weight: 500; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn {
            padding: 12px 16px; border-radius: 12px; text-align: left;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,184,130,0.2);
            color: #fff; cursor: pointer; transition: 0.2s;
        }
        .option-btn:hover { background: rgba(255,184,130,0.1); border-color: var(--accent); }
        .option-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .option-btn.correct { background: rgba(37,211,102,0.2); border-color: var(--correct); }
        .option-btn.incorrect { background: rgba(255,107,107,0.2); border-color: var(--wrong); }

        .finish-btn {
            margin: 30px auto; display: block; padding: 14px 30px;
            background: linear-gradient(90deg,#ffaa7a,#ffb882);
            border: none; border-radius: 999px; font-weight: bold; font-size: 1rem;
            cursor: pointer;
        }

        /* 慶祝動畫 */
        .celebration {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 999;
            display: none;
        }
        .celebration.active { display: block; animation: celebrate 1.5s ease-out forwards; }
        @keyframes celebrate {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        .final-score {
            text-align: center; font-size: 1.5rem; font-weight: bold;
            color: var(--accent); padding: 20px; border-radius: 20px;
            background: rgba(255,184,130,0.08); display: none;
        }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-container">
        <a class="logo"><i class="fas fa-wifi"></i> 感・知・學</a>
        <ul class="nav-links">
            <li><a class="nav-link active" onclick="show('game')">遊戲 Game</a></li>
        </ul>
        <a class="nav-cta">日語小遊戲</a>
    </div>
</nav>

<div class="container">
    <div id="game" class="content-section active">
        <header>
            <h1>🌸 N5 日语小遊戲 🌸</h1>
            <div class="subtitle">計時 + 音效 + 慶祝動畫完整版</div>
        </header>

        <div class="game-box">
            <div class="game-header">
                <div class="timer">⏱ 時間：<span id="timer">0</span> 秒</div>
                <div class="score-display">⭐ 分數：<span id="score">0</span></div>
            </div>

            <div class="level-selector" id="levelSelector"></div>
            <div id="questions-container"></div>
            <button class="finish-btn" onclick="finishGame()">完成並查看成績</button>
            <div class="final-score" id="finalScore"></div>
        </div>
    </div>
</div>

<!-- 慶祝動畫層 -->
<div class="celebration" id="celebration">
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:5rem;">🎉</div>
</div>

<script>
    // 頁面切換
    function show(id) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // 題庫
    const levels = [
        {
            name:"Level 1",
            questions:[
                {q:"「我」是？",options:["あなた","わたし","かれ"],answer:1},
                {q:"「櫻花」是？",options:["月","櫻","水"],answer:1},
                {q:"「3」是？",options:["いち","に","さん"],answer:2},
                {q:"「早安」是？",options:["おはよう","こんにちは","すみません"],answer:0},
                {q:"「貓」是？",options:["いぬ","ねこ","とり"],answer:1}
            ]
        }
    ];

    let currentLevel = 0;
    let score = 0;
    let questions = [];
    let startTime;
    let timerInterval;
    let gameFinished = false;

    // 音效
    const soundCorrect = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.mp3");
    const soundWrong = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-buzz-955.mp3");
    const soundFinish = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-complete-2031.mp3");

    // 初始化
    function init() {
        resetGame();
        loadLevel();
        startTimer();
    }

    function createLevels() {
        const el = document.getElementById("levelSelector");
        levels.forEach((l,i)=>{
            const b = document.createElement("button");
            b.className="level-btn"+(i==0?" active":"");
            b.innerText=l.name;
            b.onclick=()=>{currentLevel=i;resetGame();loadLevel();};
            el.appendChild(b);
        });
    }

    function loadLevel() {
        questions = levels[currentLevel].questions;
        const container = document.getElementById("questions-container");
        container.innerHTML = "";
        questions.forEach((q,idx)=>{
            const d = document.createElement("div");
            d.className="question";
            d.innerHTML=`<div class="question-text">${idx+1}. ${q.q}</div>`;
            const opts = document.createElement("div");
            opts.className="options";
            q.options.forEach((opt,i)=>{
                const btn = document.createElement("button");
                btn.className="option-btn";
                btn.innerText=opt;
                btn.onclick=()=>check(btn,idx,i);
                opts.appendChild(btn);
            });
            d.appendChild(opts);
            container.appendChild(d);
        });
    }

    function check(btn, qIdx, oIdx) {
        if(gameFinished) return;
        const q = questions[qIdx];
        const all = btn.parentElement.querySelectorAll(".option-btn");
        all.forEach(b=>b.disabled=true);

        if(oIdx===q.answer){
            btn.classList.add("correct");
            btn.innerText += " ✅";
            score++;
            soundCorrect.play();
        }else{
            btn.classList.add("incorrect");
            btn.innerText += " ❌";
            all[q.answer].classList.add("correct");
            soundWrong.play();
        }
        document.getElementById("score").innerText=score;
    }

    // 計時器
    function startTimer() {
        startTime = Date.now();
        timerInterval = setInterval(()=>{
            const sec = Math.floor((Date.now()-startTime)/1000);
            document.getElementById("timer").innerText=sec;
        },1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
    }

    // 結算 & 慶祝
    function finishGame() {
        if(gameFinished) return;
        gameFinished=true;
        stopTimer();
        soundFinish.play();
        document.getElementById("celebration").classList.add("active");
        const final = document.getElementById("finalScore");
        final.style.display="block";
        final.innerText=`🎉 完成！\n分數：${score}/${questions.length}`;
    }

    function resetGame() {
        score=0;
        gameFinished=false;
        document.getElementById("score").innerText=0;
        document.getElementById("finalScore").style.display="none";
        document.getElementById("celebration").classList.remove("active");
        stopTimer();
    }

    createLevels();
    init();
</script>
</body>
</html>
